{{ partial "header.html" . }}
<section id="content" role="main">
  <div class="container">
    <div class="row">
      <div class="col-sm-9">
        {{ $paginator := .Paginate (partial "list-pages.html" .) }}
        {{ range $paginator.Pages }}
          {{ .Render "li" }}
        {{ end }}
        {{ partial "pagination.html" $paginator }}
      </div>
      <div class="col-sm-3">
        {{ partial "sidebar.html" . }}
      </div>
    </div>
  </div>
</section>
{{ partial "footer.html" . }}
